<div class="container py-4" *ngIf="producto">
    <div class="row">
        <div class="col-md-6">
            <img [src]="producto.imagen" [alt]="producto.nombre" class="img-fluid rounded shadow">
        </div>
        <div class="col-md-6">
            <h2>{{ producto.nombre }}</h2>
            <p><strong>Marca:</strong> {{ producto.marca }}</p>
            <p><strong>Categoría:</strong> {{ producto.categoria }}</p>
            <p><strong>Precio:</strong> {{ producto.precio | currency:'MXN' }}</p>
            <p><strong>Stock:</strong> {{ producto.stock }}</p>
            
            <p [ngClass]="producto.disponible ? 'text-success' : 'text-danger'">
                {{ producto.disponible ? 'Disponible' : 'Agotado' }}
            </p>

            <p>{{ producto.descripcion }}</p>
            
            <button class="btn btn-primary" [disabled]="!producto.disponible">
                Agregar al carrito
            </button>
        </div>
    </div>
</div>
